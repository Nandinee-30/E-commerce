<!DOCTYPE html>
<html>
<head>
    <title>Contact Us - ShopEase</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f8fafc;
        }

        .contact-card{
            max-width:800px;
            margin:50px auto;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        .contact-title{
            text-align:center;
            margin-bottom:30px;
            font-weight:700;
        }

        .info-box{
            padding:15px;
            border-radius:10px;
            background:#f8f9fa;
            margin-bottom:15px;
        }

        .btn-home{
            background:#2563eb;
            border:none;
        }

        .btn-home:hover{
            background:#1d4ed8;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="contact-card">

        <h1 class="contact-title">Contact Us</h1>

        <p class="text-center text-muted">
            Need help with your orders, account, or shopping experience?
            Our support team is here to assist you.
        </p>

        <div class="row mt-4">

            <div class="col-md-6">
                <div class="info-box">
                    <h5>📧 Email Support</h5>
                    <p class="mb-0">support@shopease.com</p>
                </div>
            </div>

            <div class="col-md-6">
                <div class="info-box">
                    <h5>🕒 Working Hours</h5>
                    <p class="mb-0">Mon - Sat | 9:00 AM - 6:00 PM</p>
                </div>
            </div>

        </div>

        <div class="info-box mt-3">
            <h5>📍 Address</h5>
            <p class="mb-0">
                Lucknow, Uttar Pradesh, India
            </p>
        </div>

        <div class="text-center mt-4">

            <a href="/"
               class="btn btn-primary btn-home me-2">
                Home
            </a>

            <a href="/about/"
               class="btn btn-outline-secondary">
                About Us
            </a>

        </div>

    </div>

</div>

</body>
</html>
