<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">ShopEase</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="row">

        <!-- Product Image -->
        <div class="col-md-6">
            <img src="{{ product.image }}"
                 class="img-fluid border rounded p-3"
                 style="height:450px; width:100%; object-fit:contain;">
        </div>

        <!-- Product Details -->
        <div class="col-md-6">

            <h2>{{ product.name }}</h2>

            <p class="text-warning fs-5">
                ⭐⭐⭐⭐⭐ (4.8 Ratings)
            </p>

            <h3 class="text-danger">
                ₹{{ product.price }}
            </h3>
            <p class="text-success fw-bold">
                ✅ In Stock
            </p>

            <p class="text-primary">
                🚚 Free Delivery Available
            </p>

            <hr>

            <h5>Product Description</h5>

            <p>
                {{ product.description }}
            </p>

            <div class="mt-4">
<a href="/add-to-cart/{{ product.id }}/"
   class="btn btn-warning btn-lg me-2">
    Add to Cart
</a>

                <a href="/cart/" class="btn btn-danger btn-lg">
                    Buy Now
                </a>

            </div>

            <div class="mt-3">
                <a href="/" class="btn btn-secondary">
                    Back to Home
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
