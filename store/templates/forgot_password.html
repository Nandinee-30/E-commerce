<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - ShopEase</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

body{
    background:#f5f7fa;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
}

.card{
    width:100%;
    max-width:380px;
    padding:25px;
    border:none;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
    font-weight:600;
}

.form-control{
    height:42px;
    border-radius:8px;
}

.btn-primary{
    width:100%;
    height:42px;
}

p{
    font-size:14px;
    color:#555;
}

    </style>

</head>

<body>

<div class="card">

    <h2>Forgot Password</h2>

    <p class="text-center">
        Enter your registered email address. We'll help you reset your password.
    </p>

    <form>

        <div class="mb-3">
            <label>Email Address</label>

            <input
                type="email"
                class="form-control"
                placeholder="Enter your email"
                required>

        </div>

        <button class="btn btn-primary">
            Send Reset Link
        </button>

    </form>

    <div class="text-center mt-3">

        <a href="/login/">
            Back to Login
        </a>

    </div>

</div>

</body>
</html>
