<!DOCTYPE html>
<html>
<head>
    <title>Checkout - ShopEase</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fa;
        }

        .checkout-card{
            max-width:700px;
            margin:50px auto;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        .checkout-title{
            text-align:center;
            font-weight:bold;
            margin-bottom:25px;
            color:#131921;
        }

        .total-box{
            background:linear-gradient(135deg,#131921,#232f3e);
            color:white;
            padding:20px;
            border-radius:15px;
            text-align:center;
            margin-bottom:25px;
        }

        .form-control{
            border:1px solid #000;
            border-radius:10px;
        }

        .form-control:focus{
            border-color:#0d6efd;
            box-shadow:none;
        }

        .btn-order{
            width:100%;
            padding:12px;
            font-size:18px;
            font-weight:600;
            border:none;
            border-radius:10px;
            background:#198754;
        }

        .btn-order:hover{
            background:#157347;
        }

        .back-home{
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="checkout-card">

    <h2 class="checkout-title">
        📦 Checkout
    </h2>

    <div class="total-box">
        <h4>Total Amount</h4>
        <h2>₹{{ total }}</h2>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label fw-bold">
                Full Name
            </label>

            <input type="text"
                   name="name"
                   class="form-control"
                   placeholder="Enter your name"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">
                Phone Number
            </label>

            <input type="text"
                   name="phone"
                   class="form-control"
                   placeholder="Enter phone number"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">
                Delivery Address
            </label>

            <textarea name="address"
                      class="form-control"
                      rows="4"
                      placeholder="Enter complete delivery address"
                      required></textarea>
        </div>

        <button type="submit"
                class="btn btn-order">
            Place Order
        </button>

    </form>

    <div class="text-center mt-3">
        <a href="/cart/" class="back-home">
            ← Back to Cart
        </a>
    </div>

</div>

</body>
</html>
