<!DOCTYPE html>
<html>
<head>
    <title>My Orders - ShopEase</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f8fafc;
        }

        .header{
            background:linear-gradient(135deg,#2563eb,#7c3aed);
            color:white;
            padding:40px;
            border-radius:20px;
            text-align:center;
            margin-bottom:30px;
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        .order-card{
            border:none;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 4px 15px rgba(0,0,0,0.08);
            transition:0.3s;
        }

        .order-card:hover{
            transform:translateY(-5px);
            box-shadow:0 10px 25px rgba(0,0,0,0.15);
        }

        .status{
            background:#fff3cd;
            color:#856404;
            padding:6px 14px;
            border-radius:20px;
            font-size:14px;
            font-weight:600;
            display:inline-block;
        }

        .amount{
            color:#16a34a;
            font-size:24px;
            font-weight:bold;
        }

        .back-btn{
            border-radius:12px;
            padding:10px 20px;
        }

        .icon{
            font-size:18px;
            margin-right:6px;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <div class="header">
        <h1>📦 My Orders</h1>
        <p class="mb-0">
            View all your placed orders
        </p>
    </div>

    {% for order in orders %}

    <div class="card order-card mb-4">
        <div class="card-body p-4">

            <div class="d-flex justify-content-between align-items-center mb-3">

                <h4 class="fw-bold mb-0">
                    👤 {{ order.name }}
                </h4>

            </div>

            <p class="mb-2">
                📞 <strong>{{ order.phone }}</strong>
            </p>

            <p class="mb-3">
                📍 {{ order.address }}
            </p>

            <h3 class="amount">
                ₹{{ order.total_amount }}
            </h3>
            <hr>

            <small class="text-muted">
                Ordered On: {{ order.order_date }}
            </small>

        </div>
    </div>

    {% empty %}

    <div class="alert alert-warning text-center">
        📦 No Orders Yet
    </div>

    {% endfor %}

    <div class="text-center mt-4">
        <a href="/" class="btn btn-primary back-btn">
            🛍 Continue Shopping
        </a>
    </div>

</div>

</body>
</html>
