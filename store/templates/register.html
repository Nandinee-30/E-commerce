<!DOCTYPE html>
<html>
<head>
    <title>Register - ShopEase</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

   <style>
body{
    background:#f5f7fa;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
    font-family:Arial, sans-serif;
}

.login-card{
    width:100%;
    max-width:280px;
    padding:15px;
    background:#fff;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

h2{
    text-align:center;
    font-size:22px;
    font-weight:600;
    margin-bottom:12px;
}

.form-label{
    font-size:13px;
    font-weight:600;
    margin-bottom:2px;
}

.mb-3{
    margin-bottom:8px !important;
}

.form-control{
    height:34px;
    padding:4px 8px;
    font-size:13px;
    border-radius:6px;
}

.form-control:focus{
    border-color:#2563eb;
    box-shadow:none;
}

.btn-login{
    width:100%;
    height:34px;
    font-size:13px;
    font-weight:600;
    background:#2563eb;
    border:none;
    border-radius:6px;
}

.btn-login:hover{
    background:#1d4ed8;
}

.password-box{
    position:relative;
}

.eye{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:14px;
}

.text-center.mt-3{
    margin-top:8px !important;
    font-size:13px;
}

a{
    text-decoration:none;
}
</style>
</head>
<body>

<div class="login-card">

    <h2>Create Account</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text"
                   name="username"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email"
                   name="email"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>

            <div class="password-box">

                <input type="password"
                       name="password"
                       id="regpassword"
                       class="form-control">

                <span class="eye"
                      onclick="toggleRegPassword()">
                    👁️
                </span>

            </div>
        </div>

        <button type="submit"
                class="btn btn-primary btn-login">
            Register
        </button>

    </form>

    <div class="text-center mt-3">
        <a href="/">Back to Home</a>
    </div>

</div>

<script>
function toggleRegPassword() {
    var x = document.getElementById("regpassword");

    if (x.type === "password") {
        x.type = "text";
    } else {
        x.type = "password";
    }
}
</script>

</body>
</html>
