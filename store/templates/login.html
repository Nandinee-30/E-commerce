<!DOCTYPE html>
<html>
<head>
    <title>Login - ShopEase</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
body{
    background:#f5f7fa;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
}

.login-card{
    width:100%;
    max-width:280px;
    background:#fff;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    font-weight:bold;
    margin-bottom:25px;
}

.form-label{
    font-weight:600;
}

.form-control{
    height:45px;
    border-radius:8px;
}

.btn-login{
    width:100%;
    height:45px;
    background:#2563eb;
    border:none;
    border-radius:8px;
    font-weight:600;
}

.btn-login:hover{
    background:#1d4ed8;
}

.password-box{
    position:relative;
}

.eye{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#666;
}

.forgot-link{
    text-decoration:none;
    font-size:14px;
}

.back-home{
    text-align:center;
    margin-top:20px;
}
</style>

</head>

<body>

<div class="login-card">

<h2>Login</h2>

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">Username</label>

<input
type="text"
name="username"
class="form-control"
placeholder="Enter Username"
required>

</div>

<div class="mb-3">

<label class="form-label">Password</label>

<div class="password-box">

<input
type="password"
name="password"
id="password"
class="form-control"
placeholder="Enter Password"
required>

<span class="eye" onclick="togglePassword()">
<i class="fa-solid fa-eye"></i>
</span>

</div>

</div>

<div class="text-end mb-3">
<a href="/forgot-password/" class="forgot-link">
Forgot Password?
</a>
</div>

<button type="submit" class="btn btn-primary btn-login">
Login
</button>

</form>

<div class="back-home">
<a href="/">← Back to Home</a>
</div>

</div>

<script>
function togglePassword(){

var x=document.getElementById("password");

if(x.type==="password"){
x.type="text";
}
else{
x.type="password";
}

}
</script>

</body>
</html>
